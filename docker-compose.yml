services:
    
    postgres:
        
        image: postgres:17

        container_name: fred_postgres
        
        environment:
            POSTGRES_DB: supply_chain
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: postgres
        ports:
        - "5432:5432"

        volumes:
        - postgres_data:/var/lib/postgresql/data

volumes:
    postgres_data: